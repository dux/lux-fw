(security_filter) {
  @blocked {
    path *.php
    path /wp-*
    path /wordpress/*
    path /.env
    path /.git/*
    path /config/*
    path /phpmyadmin*
    path /.aws/*
    path /.ssh/*
    path /actuator/*
  }

  handle @blocked {
    respond "not found" 404
  }
}

{{DOMAIN}} {
  import security_filter
  reverse_proxy localhost:{{PORT}}
}
