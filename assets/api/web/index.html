    /* --- design tokens --------------------------------------------------- */
    /* The ONLY text styles we use: h1-h6, body (17px), .small-text (14px).
       Do not add ad-hoc text-* utility classes in markup. */

    html, body { background: #f7f7f8; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 17px; line-height: 1.55; color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
    h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.015em; }
    h3 { font-size: 18px; font-weight: 700; }
    h4 { font-size: 15px; font-weight: 600; }
    h5 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
    h6 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #9ca3af; }

    .small-text { font-size: 14px; line-height: 1.5; }

    code, pre, .mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }
    /* inline code inherits parent font-size by default; standalone <code>
       in body text should keep body size unless inside a small-text region */

    /* --- label / chip --------------------------------------------------- */
    /* <span class="label">default</span>
       <span class="label green">success</span>
       Modifiers: green red blue purple yellow gray mono  */
    .label {
      display: inline-block;
      padding: 2px 7px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      line-height: 1.4; white-space: nowrap;
      background: #f3f4f6; color: #4b5563;
      border: 1px solid #e5e7eb; border-radius: 4px;
    }
    .label.green  { background: #ecfdf5; color: #047857; border-color: #d1fae5; }
    .label.red    { background: #fff1f2; color: #be123c; border-color: #ffe4e6; }
    .label.blue   { background: #f0f9ff; color: #0369a1; border-color: #e0f2fe; }
    .label.purple { background: #f5f3ff; color: #6d28d9; border-color: #ede9fe; }
    .label.yellow { background: #fffbeb; color: #b45309; border-color: #fef3c7; }
    .label.gray   { background: #f3f4f6; color: #4b5563; border-color: #e5e7eb; }
    .label.mono   {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      text-transform: none; letter-spacing: 0; font-weight: 500;
    }

    /* --- buttons (.btn) ------------------------------------------------ */
    /* Use the lux-api-btn component or apply these classes directly to <a>/<button>. */
    .btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      font-size: 13px; font-weight: 500; line-height: 1;
      color: #374151; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 6px;
      cursor: pointer; text-decoration: none;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .btn:hover { background: #f9fafb; }
    .btn.btn-sm { padding: 4px 8px; font-size: 11px; border-radius: 4px; }

    .btn.btn-primary { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .btn.btn-primary:hover { background: #6366f1; border-color: #6366f1; }

    .btn.btn-ghost { background: transparent; border-color: transparent; color: #6b7280; }
    .btn.btn-ghost:hover { background: #f3f4f6; color: #111827; }

    .btn.btn-outline { background: #fff; color: #374151; border-color: #d1d5db; }
    .btn.btn-outline:hover { background: #f9fafb; }

    .btn.btn-on-dark { background: transparent; color: #94a3b8; border-color: transparent; }
    .btn.btn-on-dark:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .btn.btn-on-dark.btn-primary { background: #6366f1; color: #fff; border-color: #6366f1; }
    .btn.btn-on-dark.btn-primary:hover { background: #818cf8; border-color: #818cf8; }

    .btn[disabled] { opacity: 0.5; pointer-events: none; cursor: not-allowed; }

    /* --- form inputs (light) -------------------------------------------- */
    .jh-input, .jh-search {
      display: block;
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      color: #111827;
      font-size: 14px;
      line-height: 1.4;
    }
    .jh-input:focus, .jh-search:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .jh-search { width: 240px; }

    /* --- misc ------------------------------------------------------------ */
    .fez { display: contents; }
    [hidden] { display: none !important; }
    .code-pane::-webkit-scrollbar { height: 6px; }
    .code-pane::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

# Lux::Api explorer - feature list

Every feature is driven off the single introspection document at
`/<mount>/sys/schema`. All export formats and views are derived from it.

## Schema & exports

- Single-source introspection (`/sys/schema`) - canonical JSON, never edited by hand.
- OpenAPI 3 export (`/sys/openapi`) - feeds Swagger UI, Redoc, openapi-generator.
- Postman 2.1 export (`/sys/postman`) - import into Postman, Insomnia, Bruno.
- AGENTS.md export (`/sys/AGENTS.md`) - LLM-targeted markdown brief. *Original to this explorer.*
- Health probe (`/sys/health`) - liveness check.
- Format-suffix routing - `/sys/AGENTS.md`, `/sys/schema.json` etc. resolve to the same actions as the bare names.

## Navigation

- Left sidebar with namespace groups and active-section scroll-spy marker.
- Live filter input that narrows visible actions.
- Permalink `#` button per method (hover-reveal, writes to clipboard + URL hash). *Convention from GitHub markdown anchors / Stripe docs.*
- Keyboard shortcuts - `/` focus filter, `j`/`k` step methods, `?` cheatsheet, `Esc` close. *Vim-style; cheatsheet pattern from GitHub / Linear / Slack.*

## Per-API view

- Schema view (`<schema-view>`) under each API class showing the model fields, types, required flags, defaults. Auto-mounted when the class declares `api_schema` + `api_schema_ref`.
- Collection vs. member action groups (blue / purple labels).
- Class-level description / detail rendered with inline markdown (`**bold**`, `*italic*`, `` `code` ``, `[link](url)`, bare URLs).
- Horizontal divider above each API class title for visual separation.

## Per-method view

- Method title with `#` permalink button on hover.
- Action description + detail with markdown rendering.
- Parameters hidden by default behind a "Show params" toggle with slide-down animation.
- Field rows show name (200px column), type chip, required badge, default, allowed values, and optional description on a second line.
- `xxx_ref` fields are rendered as dotted-underline links to the referenced API section.
- Hover popover on `_ref` links previews the target schema's fields without leaving the page. *Inspired by Stoplight Studio's nested `$ref` previews.*

## Runner / try-it panel

- PayPal-style collapsed preview bar with `Try it` button. *Borrowed from PayPal Developer docs.*
- Smart inputs per param type: text, number, checkbox, select (when `values:` declared), date, color.
- Inline client-side validation - required, allowed values, numeric coercion - before the POST fires. *Pattern from Postman's request validator.*
- Send button with spinner, response time, status pill (green / yellow / red), and resolved path display.
- Bearer token persists across reloads via `localStorage` and is shared by every runner. *Fix for Swagger UI's default loss-on-refresh behavior.*
- Multi-language snippet tabs - curl, JSON-RPC envelope, JS (ky), Ruby (http.rb), Python (httpx), C# (Flurl), Java (OkHttp). *Multi-language coverage inspired by Stripe / Twilio docs; lib picks favor terse "hacker" HTTP clients over stdlib boilerplate.*
- Copy button per snippet tab.
- Request history (last 5 per endpoint, persisted in `localStorage`). Click a row to repopulate the form and jump to the try tab. *Inspired by Postman / Insomnia history.*
- JSON tree response viewer - collapsible, type-colored, max-height 700px with auto scroll, all keys expanded by default, per-node manual toggle. *Inspired by Postman / Bruno response previews.*

## Architecture (developer-facing)

- Built with fez.js (no React / Vue / build step). Single static index.html + component files.
- Tiny inline markdown renderer (`window.luxMd`) for desc / detail strings.
- Global JSON tree toggle handler (`window.luxJvToggle`) so response trees survive fez template re-renders without re-binding.
- Component files live in `assets/api/web/fez/`. Add a new component by dropping a `.fez` file there and including it in this index.html.

-->
